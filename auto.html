<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: transparent;
}

video {
  width: 100%;
  height: auto;
  display: block;
  object-fit: cover;

  /* Ultra subtle edge fade (1%–99%) */
  -webkit-mask-image:
    linear-gradient(to right,
      transparent 0%,
      black 1%,
      black 99%,
      transparent 100%),
    linear-gradient(to bottom,
      transparent 0%,
      black 1%,
      black 99%,
      transparent 100%);

  -webkit-mask-composite: source-in;
  mask-composite: intersect;

  mask-image:
    linear-gradient(to right,
      transparent 0%,
      black 1%,
      black 99%,
      transparent 100%),
    linear-gradient(to bottom,
      transparent 0%,
      black 1%,
      black 99%,
      transparent 100%);
}
</style>

</head>
<body>

<video autoplay muted loop playsinline>
  <source src="https://dcarlson600-test.github.io/Autonomous/autovideo.mp4" type="video/mp4">
</video>



</body>
</html>
