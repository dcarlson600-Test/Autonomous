<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: transparent;
}

/* Maintain proportional scaling */
.video-wrapper {
  width: 100%;
  aspect-ratio: 16 / 9; /* Change if your video is not 16:9 */
  display: flex;
  align-items: center;
  justify-content: center;
}

video {
  width: 100%;
  height: 100%;
  object-fit: contain; /* Shows entire video */
  display: block;

  /* Ultra subtle edge fade */
  -webkit-mask-image:
    linear-gradient(to right,
      transparent 0%,
      black 1%,
      black 99%,
      transparent 100%),
    linear-gradient(to bottom,
      transparent 0%,
      black 1%,
      black 99%,
      transparent 100%);

  -webkit-mask-composite: source-in;
  mask-composite: intersect;

  mask-image:
    linear-gradient(to right,
      transparent 0%,
      black 1%,
      black 99%,
      transparent 100%),
    linear-gradient(to bottom,
      transparent 0%,
      black 1%,
      black 99%,
      transparent 100%);
}
</style>

</head>
<body>

<div class="video-wrapper">
  <video autoplay muted loop playsinline>
    <source src="https://dcarlson600-test.github.io/Autonomous/autovideo.MP4" type="video/mp4">
  </video>
</div>

</body>
</html>
