<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: transparent;
}

.video-wrapper {
  width: 100%;
  aspect-ratio: 16 / 9;
  display: flex;
  align-items: center;
  justify-content: center;
}

video {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;

  /* Combined 4-edge + subtle feather fade */
  -webkit-mask:
    radial-gradient(ellipse at center,
      black 80%,
      transparent 100%),
    linear-gradient(to right,
      transparent 0%,
      black 4%,
      black 96%,
      transparent 100%),
    linear-gradient(to bottom,
      transparent 0%,
      black 4%,
      black 96%,
      transparent 100%);

  -webkit-mask-composite: source-in;

  mask:
    radial-gradient(ellipse at center,
      black 80%,
      transparent 100%),
    linear-gradient(to right,
      transparent 0%,
      black 4%,
      black 96%,
      transparent 100%),
    linear-gradient(to bottom,
      transparent 0%,
      black 2%,
      black 96%,
      transparent 100%);

  mask-composite: intersect;
}
</style>

</head>
<body>

<div class="video-wrapper">
  <video autoplay muted loop playsinline>
    <source src="https://dcarlson600-test.github.io/Autonomous/autovideo720.MP4" type="video/mp4">
  </video>
</div>

</body>
</html>
