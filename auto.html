<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: transparent;
}

.video-wrapper {
  width: 100%;
  aspect-ratio: 16 / 9; /* adjust if needed */
  display: flex;
  align-items: center;
  justify-content: center;
}

video {
  width: 100%;
  height: 100%;
  object-fit: contain;
  display: block;

  /* True 4-edge fade */
  -webkit-mask:
    radial-gradient(ellipse at center,
      black 70%,
      transparent 100%);
      
  mask:
    radial-gradient(ellipse at center,
      black 70%,
      transparent 100%);
}
</style>
</head>
<body>

<div class="video-wrapper">
  <video autoplay muted loop playsinline>
    <source src="https://dcarlson600-test.github.io/Autonomous/autovideo720.MP4" type="video/mp4">
  </video>
</div>

</body>
</html>
