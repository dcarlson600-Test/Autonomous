<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: transparent;
}

/* GLASS CONTAINER MATCHING MAIN TILE */
.glass-frame {
  position: relative;
  border-radius: 34px;
  overflow: hidden;

  /* Very light translucency */
  background: rgba(255,255,255,0.08);

  backdrop-filter: blur(70px) saturate(160%) contrast(115%);
  -webkit-backdrop-filter: blur(70px) saturate(160%) contrast(115%);

  border: 1px solid rgba(255,255,255,0.25);

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.45),
    0 8px 28px rgba(0,0,0,0.12);
}

/* Luminance compression layer */
.glass-frame::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 34px;
  background: linear-gradient(
    to bottom,
    rgba(255,255,255,0.18),
    rgba(255,255,255,0.05)
  );
  pointer-events: none;
  mix-blend-mode: overlay;
}

/* Subtle text stabilization layer */
.glass-frame::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: 34px;
  background: rgba(0,0,0,0.12);
  pointer-events: none;
}

/* VIDEO */
video {
  width: 100%;
  height: auto;
  display: block;
  object-fit: cover;

  /* Ultra subtle edge fade (unchanged) */
  -webkit-mask-image:
    linear-gradient(to right,
      transparent 0%,
      black 1%,
      black 99%,
      transparent 100%),
    linear-gradient(to bottom,
      transparent 0%,
      black 1%,
      black 99%,
      transparent 100%);

  -webkit-mask-composite: source-in;
  mask-composite: intersect;

  mask-image:
    linear-gradient(to right,
      transparent 0%,
      black 1%,
      black 99%,
      transparent 100%),
    linear-gradient(to bottom,
      transparent 0%,
      black 1%,
      black 99%,
      transparent 100%);
}

</style>

</head>
<body>

<div class="glass-frame">
  <video autoplay muted loop playsinline>
    <source src="https://dcarlson600-test.github.io/Autonomous/websitevideo.mp4" type="video/mp4">
  </video>
</div>

<script>
function sendHeight() {
  const height = document.documentElement.scrollHeight;
  parent.postMessage({ frameHeight: height }, "*");
}

window.addEventListener("load", sendHeight);
window.addEventListener("resize", sendHeight);
document.querySelector("video").addEventListener("loadedmetadata", sendHeight);
</script>

</body>
</html>
