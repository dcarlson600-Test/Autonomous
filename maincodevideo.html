<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
html, body {
  margin: 0;
  padding: 0;
  height: 600px; /* MUST match iframe height */
  overflow: hidden;
  background: transparent;
}

.video-container {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

video {
  width: 100%;
  height: 100%;
  object-fit: contain; /* Shows full video without cropping */
  display: block;

  -webkit-mask-image:
    linear-gradient(to right,
      transparent 0%,
      black 1%,
      black 99%,
      transparent 100%),
    linear-gradient(to bottom,
      transparent 0%,
      black 1%,
      black 99%,
      transparent 100%);

  -webkit-mask-composite: source-in;
  mask-composite: intersect;

  mask-image:
    linear-gradient(to right,
      transparent 0%,
      black 1%,
      black 99%,
      transparent 100%),
    linear-gradient(to bottom,
      transparent 0%,
      black 1%,
      black 99%,
      transparent 100%);
}
</style>
</head>
<body>

<div class="video-container">
  <video autoplay muted loop playsinline>
    <source src="https://dcarlson600-test.github.io/Autonomous/websitevideo.mp4" type="video/mp4">
  </video>
</div>

</body>
</html>
