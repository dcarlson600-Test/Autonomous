<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: transparent;
}

/* VIDEO — Apple Liquid Glass Treatment */
video {
  width: 100%;
  height: auto;
  display: block;
  object-fit: cover;

  /* Apple-level translucency effect */
  backdrop-filter: blur(70px) saturate(160%) contrast(115%);
  -webkit-backdrop-filter: blur(70px) saturate(160%) contrast(115%);

  /* Ultra subtle edge fade (unchanged) */
  -webkit-mask-image:
    linear-gradient(to right,
      transparent 0%,
      black 1%,
      black 99%,
      transparent 100%),
    linear-gradient(to bottom,
      transparent 0%,
      black 1%,
      black 99%,
      transparent 100%);

  -webkit-mask-composite: source-in;
  mask-composite: intersect;

  mask-image:
    linear-gradient(to right,
      transparent 0%,
      black 1%,
      black 99%,
      transparent 100%),
    linear-gradient(to bottom,
      transparent 0%,
      black 1%,
      black 99%,
      transparent 100%);

  /* Subtle internal luminance compression */
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.25),
    inset 0 -1px 0 rgba(255,255,255,0.05);
}
</style>

</head>
<body>

<video autoplay muted loop playsinline>
  <source src="https://dcarlson600-test.github.io/Autonomous/websitevideo.mp4" type="video/mp4">
</video>

<script>
function sendHeight() {
  const height = document.documentElement.scrollHeight;
  parent.postMessage({ frameHeight: height }, "*");
}

window.addEventListener("load", sendHeight);
window.addEventListener("resize", sendHeight);
document.querySelector("video").addEventListener("loadedmetadata", sendHeight);
</script>

</body>
</html>
